# fly.toml — fahrzeug-protokolle-v2 (React PWA)
# Region: fra (Frankfurt), analog zur alten App

app = 'fahrzeug-protokolle-v2'
primary_region = 'fra'

[build]
  # Supabase-Credentials als Build-Args aus Fly.io Secrets übergeben
  [build.args]
    VITE_SUPABASE_URL = ""
    VITE_SUPABASE_KEY = ""
    VITE_APP_PASSWORD = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
