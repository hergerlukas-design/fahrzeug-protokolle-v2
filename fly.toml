# fly.toml — fahrzeug-protokolle-v2 (React PWA)
# Region: fra (Frankfurt), analog zur alten App

app = 'fahrzeug-protokolle-v2'
primary_region = 'fra'


[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
