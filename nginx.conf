server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — alle Pfade → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML und Service Worker dürfen nicht gecacht werden
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Statische Assets langfristig cachen (Vite baut mit Content-Hash)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Bilder und Fonts im public/-Verzeichnis: 7 Tage cachen
    location ~* \.(png|jpg|jpeg|webp|svg|ico|woff|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
